name: Publish

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Run unit tests
        run: nix develop --impure --command go test ./...

      - name: Run hooks
        run: nix develop --impure --command prek run --all-files

      - name: Run flake checks
        run: nix flake check --impure

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GHCR images and dist artifacts
        run: nix develop --impure --command goreleaser release --clean --config .goreleaser.publish.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: go-publish-dist
          path: dist/*
          if-no-files-found: error
