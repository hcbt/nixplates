name: Test

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Sync, test, and run app
        run: |
          nix develop --impure --command uv sync --frozen
          nix develop --impure --command uv run pre-commit run --all-files
          nix develop --impure --command uv run python -m pytest
          nix develop --impure --command uv run example-pkg
