name: CI

on:
  pull_request:
  push:

jobs:
  flake-check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31

      - name: Validate flake outputs
        run: nix flake check
